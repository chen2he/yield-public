# Single-package repo. `packages: [.]` is required so pnpm 10.x (the Cloudflare
# builder) doesn't abort with "packages field missing or empty" when it sees this file.
packages:
  - .

# Pre-approve native build scripts (pnpm 10+ blocks dependency build scripts by
# default): `workerd` downloads its platform binary; `esbuild` / `sharp` / etc.
# build native bindings. Without this they're skipped (ERR_PNPM_IGNORED_BUILDS).
onlyBuiltDependencies:
  - esbuild
  - workerd
  - sharp
  - unrs-resolver
  - "@parcel/watcher"
  - "@swc/core"
